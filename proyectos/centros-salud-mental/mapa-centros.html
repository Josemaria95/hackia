<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Centros de Salud Mental — Santiago & Lima</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222633;
    --border: #2a2e3d;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --blue: #3b82f6;
    --orange: #f59e0b;
    --red: #ef4444;
    --pink: #ec4899;
    --teal: #14b8a6;
    --purple: #a855f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
    padding: 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: .3rem; }
  .header p { color: var(--muted); font-size: .95rem; }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    padding: 1.2rem 2rem;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
    min-width: 80px;
  }
  .stat .num {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--accent2);
  }
  .stat .label {
    font-size: .7rem;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: .05em;
  }

  .controls {
    padding: 1rem 2rem;
    display: flex;
    gap: .8rem;
    flex-wrap: wrap;
    align-items: center;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .search {
    flex: 1;
    min-width: 200px;
    padding: .6rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: .9rem;
    outline: none;
  }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--muted); }

  .btn-group { display: flex; gap: 0; flex-wrap: wrap; }
  .btn {
    padding: .5rem .9rem;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: .78rem;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn:first-child { border-radius: 6px 0 0 6px; }
  .btn:last-child { border-radius: 0 6px 6px 0; }
  .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn:hover:not(.active) { background: var(--card-hover); color: var(--text); }

  .select-filter {
    padding: .5rem .8rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: .82rem;
    cursor: pointer;
    outline: none;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
    padding: 1.5rem 2rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    transition: all .2s;
    cursor: default;
    position: relative;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(99,102,241,.12);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: .8rem;
    margin-bottom: .6rem;
  }
  .card-name {
    font-size: .95rem;
    font-weight: 600;
    line-height: 1.3;
    flex: 1;
  }
  .badge {
    font-size: .65rem;
    padding: .2rem .5rem;
    border-radius: 20px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-cosam { background: rgba(34,197,94,.15); color: var(--green); }
  .badge-hospital { background: rgba(59,130,246,.15); color: var(--blue); }
  .badge-privado { background: rgba(168,85,247,.15); color: var(--purple); }
  .badge-especializado { background: rgba(245,158,11,.15); color: var(--orange); }
  .badge-universitario { background: rgba(20,184,166,.15); color: var(--teal); }
  .badge-adicciones { background: rgba(239,68,68,.15); color: var(--red); }
  .badge-csmc { background: rgba(236,72,153,.15); color: var(--pink); }
  .badge-institucional { background: rgba(156,163,175,.15); color: var(--muted); }

  .card-meta {
    font-size: .8rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .card-meta .row {
    display: flex;
    gap: .4rem;
    align-items: flex-start;
  }
  .card-meta .icon {
    width: 16px;
    text-align: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .card-meta a {
    color: var(--accent2);
    text-decoration: none;
    word-break: break-all;
  }
  .card-meta a:hover { text-decoration: underline; }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: .3rem;
    margin-top: .7rem;
  }
  .tag {
    font-size: .65rem;
    padding: .15rem .45rem;
    background: rgba(99,102,241,.1);
    color: var(--accent2);
    border-radius: 4px;
  }

  .city-divider {
    grid-column: 1 / -1;
    padding: .8rem 0;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .city-divider h2 {
    font-size: 1.1rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .city-divider .line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .city-divider .count {
    font-size: .8rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 1.1rem;
  }

  .comuna-tag {
    font-size: .7rem;
    padding: .15rem .4rem;
    background: rgba(255,255,255,.06);
    border-radius: 4px;
    color: var(--muted);
    margin-left: .3rem;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; padding: 1rem; }
    .controls { padding: .8rem 1rem; }
    .header { padding: 1.5rem 1rem; }
    .header h1 { font-size: 1.3rem; }
    .stats-bar { gap: .8rem; padding: .8rem 1rem; }
  }
</style>
</head>

<div class="header">

<div class="controls">

  <select class="select-filter" id="comunaFilter">

</div>

function getAllCenters() {
  const all = [];
  DATA.santiago_centros.forEach(c => all.push({...c, ciudad: 'Santiago'}));
  DATA.santiago_cosam.forEach(c => all.push({...c, ciudad: 'Santiago', especialidades: c.especialidades || ['Salud mental comunitaria','Psiquiatria','Psicologia','Drogas y alcohol']}));
  DATA.santiago_hospitales.forEach(c => all.push({...c, ciudad: 'Santiago'}));
  DATA.lima.forEach(c => all.push({...c, ciudad: 'Lima'}));
  return all;
}

function getBadgeClass(tipo) {
  const t = (tipo||'').toLowerCase();
  if (t.includes('cosam')) return 'badge-cosam';
  if (t.includes('csmc')) return 'badge-csmc';
  if (t.includes('hospital publico') || t.includes('hospital psiq')) return 'badge-hospital';
  if (t.includes('hospital institucional')) return 'badge-institucional';
  if (t.includes('privada grande')) return 'badge-privado';
  if (t.includes('privad') || t.includes('clinica')) return 'badge-privado';
  if (t.includes('universitario')) return 'badge-universitario';
  if (t.includes('especializ')) return 'badge-especializado';
  if (t.includes('adiccion')) return 'badge-adicciones';
  return 'badge-especializado';
}

function getBadgeLabel(tipo) {
  const t = (tipo||'').toLowerCase();
  if (t.includes('cosam')) return 'COSAM';
  if (t.includes('csmc')) return 'CSMC';
  if (t.includes('hospital publico') || t.includes('hospital psiq')) return 'Hospital';
  if (t.includes('hospital institucional')) return 'FF.AA.';
  if (t.includes('privada grande')) return 'Clinica Grande';
  if (t.includes('clinica privad')) return 'Clinica Privada';
  if (t.includes('centro privad')) return 'Centro Privado';
  if (t.includes('universitario')) return 'Universidad';
  if (t.includes('adiccion')) return 'Adicciones';
  if (t.includes('especializ')) return 'Especializado';
  return tipo;
}

const allCenters = getAllCenters();

// Populate filters
const types = [...new Set(allCenters.map(c => c.tipo))].sort();
const typeSelect = document.getElementById('typeFilter');
types.forEach(t => {
  const opt = document.createElement('option');
  opt.value = t;
  opt.textContent = t;
  typeSelect.appendChild(opt);
});

function updateComunaFilter(city) {
  const comunaSelect = document.getElementById('comunaFilter');
  comunaSelect.innerHTML = '<option value="all">Todas las comunas/distritos</option>';
  const filtered = city === 'all' ? allCenters : allCenters.filter(c => c.ciudad === city);
  const comunas = [...new Set(filtered.map(c => c.comuna))].sort();
  comunas.forEach(com => {
    const opt = document.createElement('option');
    opt.value = com;
    opt.textContent = com;
    comunaSelect.appendChild(opt);
  });
}
updateComunaFilter('all');

// Stats
function updateStats(centers) {
  const stgo = centers.filter(c => c.ciudad === 'Santiago').length;
  const lima = centers.filter(c => c.ciudad === 'Lima').length;
  const cosam = centers.filter(c => (c.tipo||'').toLowerCase().includes('cosam')).length;
  const hosp = centers.filter(c => (c.tipo||'').toLowerCase().includes('hospital')).length;
  const comunas = new Set(centers.map(c => c.comuna)).size;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="num">${centers.length}</div><div class="label">Total centros</div></div>
    <div class="stat"><div class="num">${stgo}</div><div class="label">Santiago</div></div>
    <div class="stat"><div class="num">${lima}</div><div class="label">Lima</div></div>
    <div class="stat"><div class="num">${cosam}</div><div class="label">COSAM/CSMC</div></div>
    <div class="stat"><div class="num">${hosp}</div><div class="label">Hospitales</div></div>
    <div class="stat"><div class="num">${comunas}</div><div class="label">Comunas</div></div>
  `;
}

function renderCards(centers) {
  const grid = document.getElementById('grid');
  if (centers.length === 0) {
    grid.innerHTML = '<div class="no-results">No se encontraron centros con esos filtros.</div>';
    return;
  }

  // Group by city
  const grouped = {};
  centers.forEach(c => {
    if (!grouped[c.ciudad]) grouped[c.ciudad] = [];
    grouped[c.ciudad].push(c);
  });

  let html = '';
  const cityOrder = ['Santiago', 'Lima'];
  cityOrder.forEach(city => {
    if (!grouped[city]) return;
    const list = grouped[city];
    html += `<div class="city-divider">
      <h2>${city === 'Santiago' ? '🇨🇱 Santiago de Chile' : '🇵🇪 Lima, Peru'}</h2>
      <div class="line"></div>
      <div class="count">${list.length} centros</div>
    </div>`;
    list.forEach(c => {
      const specs = (c.especialidades || []).slice(0, 5);
      html += `<div class="card">
        <div class="card-header">
          <div class="card-name">${c.nombre}</div>
          <span class="badge ${getBadgeClass(c.tipo)}">${getBadgeLabel(c.tipo)}</span>
        </div>
        <div class="card-meta">
          <div class="row"><span class="icon">📍</span><span>${c.direccion} <span class="comuna-tag">${c.comuna}</span></span></div>
          ${c.telefono ? `<div class="row"><span class="icon">📞</span><span>${c.telefono}</span></div>` : ''}
          ${c.web ? `<div class="row"><span class="icon">🌐</span><a href="${c.web}" target="_blank" rel="noopener">${c.web.replace(/https?:\/\/(www\.)?/, '').replace(/\/$/, '').substring(0, 40)}${c.web.length > 50 ? '...' : ''}</a></div>` : ''}
        </div>
        ${specs.length ? `<div class="tags">${specs.map(s => `<span class="tag">${s}</span>`).join('')}</div>` : ''}
      </div>`;
    });
  });
  grid.innerHTML = html;
}

function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase();
  const city = document.querySelector('#cityFilter .btn.active').dataset.city;
  const type = document.getElementById('typeFilter').value;
  const comuna = document.getElementById('comunaFilter').value;

  let filtered = allCenters;

  if (city !== 'all') filtered = filtered.filter(c => c.ciudad === city);
  if (type !== 'all') filtered = filtered.filter(c => c.tipo === type);
  if (comuna !== 'all') filtered = filtered.filter(c => c.comuna === comuna);

  if (query) {
    filtered = filtered.filter(c => {
      const text = [c.nombre, c.comuna, c.direccion, c.tipo, ...(c.especialidades || [])].join(' ').toLowerCase();
      return text.includes(query);
    });
  }

  updateStats(filtered);
  renderCards(filtered);
}

// Events
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('typeFilter').addEventListener('change', applyFilters);
document.getElementById('comunaFilter').addEventListener('change', applyFilters);

document.querySelectorAll('#cityFilter .btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#cityFilter .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateComunaFilter(btn.dataset.city);
    applyFilters();
  });
});

// Init
applyFilters();
